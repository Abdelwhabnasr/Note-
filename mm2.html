<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قصة رومانسية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Cairo', sans-serif;
    margin: 0;
    padding: 0;
    background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1400&q=80') no-repeat center center fixed;
    background-size: cover;
    color: #E0E0E0;
    direction: rtl;
  }

  header {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
  }

  .container {
    max-width: 800px;
    margin: 30px auto;
    background: rgba(30,30,30,0.8);
    padding: 20px;
    border-radius: 15px;
  }

  .story-title {
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 15px;
    color: #FFD700;
  }

  .story-content {
    font-size: 18px;
    line-height: 1.6;
    color: #CCCCCC;
    white-space: pre-wrap; /* يحافظ على الأسطر الجديدة */
    margin-bottom: 30px;
  }

  .buttons-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  button {
    padding: 15px 30px;
    border: none;
    border-radius: 10px;
    background: #FFD700;
    color: #000;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>

<header>قصة رومانسية</header>

<div class="container">
  <!-- عنوان القصة -->
  <div class="story-title">قصة رومانسية</div>

  <!-- نص القصة -->
  <div class="story-content" id="storyText">
مرحبًا بك في هذه القصة الرومانسية.  
يمكنك الآن قراءة أحداث القصة خطوة بخطوة،  
والاستمتاع بالحب والمغامرات بين شخصياتها.  

استمتع بالقراءة!
  </div>

  <!-- الزرين -->
  <div class="buttons-container">
    <button onclick="window.location.href='mm4.html'">
      الذهاب للدردشة مع بطل القصة
    </button>
    <button onclick="window.location.href='index.html'">
      العودة للصفحة الرئيسية
    </button>
  </div>
</div>

<script>
// عند تحميل الصفحة، تحقق إذا في نص متغير من الدردشة
const storyText = document.getElementById('storyText');
let updated = localStorage.getItem("storyUpdate");
if(updated){
  storyText.innerText = updated;
}

// تحديث مباشر لو المستخدم غيّر النص من صفحة الدردشة
window.addEventListener('storage', function(e){
  if(e.key === "storyUpdate"){
    storyText.innerText = e.newValue;
  }
});
</script>

</body>
</html>
