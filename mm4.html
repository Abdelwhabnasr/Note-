<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قصة رومانسية - دردشة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Cairo', sans-serif;
    margin: 0; padding: 0;
    background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1400&q=80') no-repeat center center fixed;
    background-size: cover;
    color: #E0E0E0;
    direction: rtl;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    text-align: right;
    font-size: 28px;
    font-weight: bold;
  }
  .story-info {
    max-width: 600px;
    margin: 20px auto;
    background: rgba(30,30,30,0.8);
    border-radius: 15px;
    padding: 15px;
    display: flex;
    gap: 15px;
    align-items: center;
  }
  .story-info img {
    width: 120px; height: 120px; border-radius: 15px; object-fit: cover;
  }
  .story-info div { display:flex; flex-direction: column; gap:5px; }
  .story-info h2 { margin:0; color:#FFD700; }
  .story-info p { margin:0; color:#CCCCCC; }

  .chat-container {
    flex: 1; display: flex; flex-direction: column; padding: 20px;
    max-width: 600px; margin:10px auto; gap:15px;
    overflow-y: auto; background: rgba(0,0,0,0.4); border-radius: 15px;
  }

  .message {
    max-width: 70%; padding: 10px 15px; border-radius: 15px;
    word-wrap: break-word; font-size: 16px; line-height: 1.4;
  }
  .from-character { background: rgba(255,215,0,0.8); color:#000; align-self:flex-start; }
  .from-user { background: rgba(50,50,50,0.8); color:#FFD700; align-self:flex-end; }

  .input-container {
    display:flex; justify-content:center; align-items:center; gap:10px;
    padding:10px 20px; max-width:600px; margin:0 auto 20px; background: rgba(0,0,0,0.6); border-radius:15px;
  }
  .input-container input { flex:1; padding:10px 15px; border-radius:10px; border:none; font-size:16px; }
  .input-container button { padding:10px 20px; border-radius:10px; border:none; background: rgba(255,215,0,0.8); color:#000; font-weight:bold; cursor:pointer; }
  .input-container button:hover { transform: translateY(-2px); box-shadow:0 4px 8px rgba(0,0,0,0.4);}
</style>
</head>
<body>

<header>قصة رومانسية</header>

<div class="story-info">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSaVEp9KM_JvmiqYJ6f09kNN7dieYy5ivbsKA&s" alt="قصة رومانسية">
  <div>
    <h2>قصة رومانسية</h2>
    <p>رومانسية وحب مثير مع الكثير من المفاجآت.</p>
  </div>
</div>

<div class="chat-container" id="chat-container">
  <div class="message from-character">مرحبًا بك! اكتب كلمة لتغيير أحداث القصة: "حب" أو "خوف".</div>
</div>

<div class="input-container">
  <input type="text" id="userInput" placeholder="اكتب رسالتك هنا...">
  <button onclick="sendMessage()">إرسال</button>
</div>

<button style="margin:10px auto; display:block; padding:10px 20px; border:none; border-radius:10px; background:#FFD700; color:#000; cursor:pointer;" onclick="window.location.href='mm2.html'">العودة لـلقصه</button>

<script>
const chat = document.getElementById('chat-container');

function addMessage(text, type){
  const msg = document.createElement('div');
  msg.classList.add('message', type);
  msg.textContent = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function sendMessage(){
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,'from-user');
  input.value='';

  setTimeout(()=>{
    let reply = '';
    let msg = text.toLowerCase();

    // ❤️ الحب
    if (
      msg.includes("حب") ||
      msg.includes("بحب") ||
      msg.includes("رومانسي") ||
      msg.includes("مشاعر") ||
      msg.includes("قلب")
    ) {
      reply = 'بطل القصة: الحب ساعات بيغيّر كل حاجة… وأنا حاسس بده دلوقتي ❤️';
      localStorage.setItem(
        'storyUpdate',
        'بطل القصة اقترب بهدوء، وصوته كان مليان إحساس.'
      );
    }

    // 😱 الخوف
    else if (
      msg.includes("خوف") ||
      msg.includes("خايف") ||
      msg.includes("مرعب") ||
      msg.includes("رعب") ||
      msg.includes("قلق")
    ) {
      reply = 'بطل القصة: الخوف مش ضعف… الخوف إحساس.';
      localStorage.setItem(
        'storyUpdate',
        'بطل القصة وقف مكانه، عينه كانت بتراقب كل حركة.'
      );
    }

    // 💔 الحزن
    else if (
      msg.includes("حزن") ||
      msg.includes("حزين") ||
      msg.includes("وجع") ||
      msg.includes("دموع") ||
      msg.includes("فراق")
    ) {
      reply = 'بطل القصة: في وجع ما بيتقالش… بس بيتحس.';
      localStorage.setItem(
        'storyUpdate',
        'بطل القصة سكت شوية، وكمل بصوت واطي.'
      );
    }

    // ✈️ السفر / الهروب
    else if (
      msg.includes("سفر") ||
      msg.includes("سافرت") ||
      msg.includes("تسافر") ||
      msg.includes("هروب") ||
      msg.includes("بعد")
    ) {
      reply = 'بطل القصة: السفر كان هروب أكتر منه حلم.';
      localStorage.setItem(
        'storyUpdate',
        'بطل القصة بص بعيد، كأنه فاكر طريق قديم.'
      );
    }

    // 🧠 كلمة واحدة فقط
    else if (msg.trim().split(" ").length === 1) {
      reply = 'بطل القصة: الكلمة الواحدة وراها حكاية… كمّل.';
    }

    // ❌ مش مفهوم
    else {
      reply = 'بطل القصة: مش فاهم قصدك… جرّب كلمة تعبّر عن إحساسك.';
    }

    addMessage(reply,'from-character');
  },1000);
}

// إرسال بالضغط على Enter
document.getElementById('userInput').addEventListener('keydown', function(e){
  if(e.key==='Enter'){ sendMessage(); }
});
</script>

</body>
</html>
