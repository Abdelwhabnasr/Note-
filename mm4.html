<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قصة رومانسية - دردشة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Cairo', sans-serif;
    margin: 0; padding: 0;
    background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1400&q=80') no-repeat center center fixed;
    background-size: cover;
    color: #E0E0E0;
    direction: rtl;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    text-align: right;
    font-size: 28px;
    font-weight: bold;
  }
  .story-info {
    max-width: 600px;
    margin: 20px auto;
    background: rgba(30,30,30,0.8);
    border-radius: 15px;
    padding: 15px;
    display: flex;
    gap: 15px;
    align-items: center;
  }
  .story-info img {
    width: 120px; height: 120px; border-radius: 15px; object-fit: cover;
  }
  .story-info div { display:flex; flex-direction: column; gap:5px; }
  .story-info h2 { margin:0; color:#FFD700; }
  .story-info p { margin:0; color:#CCCCCC; }

  .chat-container {
    flex: 1; display: flex; flex-direction: column; padding: 20px;
    max-width: 600px; margin:10px auto; gap:15px;
    overflow-y: auto; background: rgba(0,0,0,0.4); border-radius: 15px;
  }

  .message {
    max-width: 70%; padding: 10px 15px; border-radius: 15px;
    word-wrap: break-word; font-size: 16px; line-height: 1.4;
  }
  .from-character { background: rgba(255,215,0,0.8); color:#000; align-self:flex-start; }
  .from-user { background: rgba(50,50,50,0.8); color:#FFD700; align-self:flex-end; }

  .input-container {
    display:flex; justify-content:center; align-items:center; gap:10px;
    padding:10px 20px; max-width:600px; margin:0 auto 20px; background: rgba(0,0,0,0.6); border-radius:15px;
  }
  .input-container input { flex:1; padding:10px 15px; border-radius:10px; border:none; font-size:16px; }
  .input-container button { padding:10px 20px; border-radius:10px; border:none; background: rgba(255,215,0,0.8); color:#000; font-weight:bold; cursor:pointer; }
  .input-container button:hover { transform: translateY(-2px); box-shadow:0 4px 8px rgba(0,0,0,0.4);}
</style>
</head>
<body>

<header>قصة رومانسية</header>

<div class="story-info">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSaVEp9KM_JvmiqYJ6f09kNN7dieYy5ivbsKA&s" alt="قصة رومانسية">
  <div>
    <h2>قصة رومانسية</h2>
    <p>رومانسية وحب مثير مع الكثير من المفاجآت.</p>
  </div>
</div>

<div class="chat-container" id="chat-container">
  <div class="message from-character">مرحبًا بك! انا يوسف".</div>
</div>

<div class="input-container">
  <input type="text" id="userInput" placeholder="اكتب رسالتك هنا...">
  <button onclick="sendMessage()">إرسال</button>
</div>

<button style="margin:10px auto; display:block; padding:10px 20px; border:none; border-radius:10px; background:#FFD700; color:#000; cursor:pointer;" onclick="window.location.href='mm2.html'">العودة لـلقصه</button>

<script>
const chat = document.getElementById('chat-container');

function addMessage(text, type){
  const msg = document.createElement('div');
  msg.classList.add('message', type);
  msg.textContent = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function sendMessage(){
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,'from-user');
  input.value='';

  setTimeout(()=>{
    let reply = '';
    let msg = text.toLowerCase();

    // 🔹 السفر / البعد
    if (msg.includes("سافر") || msg.includes("سافرت") || msg.includes("تسافر") || msg.includes("بعد")) {
      const travelReplies = [
        "سافرت لأن وضعي وقتها كان صعب جدًا، وكنت شايف إن السفر الحل الوحيد.",
        "مكنش قرار سهل، بس كنت حاسس إني لو فضلت مكاني هخسر نفسي.",
        "الناس فاكرة إني سافرت بإرادتي، بس الحقيقة إني كنت مضغوط من كل اتجاه."
      ];
      reply = travelReplies[Math.floor(Math.random()*travelReplies.length)];
    }

    // 🔹 لو القارئ قال: لو بتحبه مكنتش عملت كده
    else if (msg.includes("بحبها") || msg.includes("عشانه") || msg.includes("ممكنش")) {
      const loveMistakeReplies = [
        "الحب لوحده مش دايمًا كفاية، أحيانًا الظروف بتغلب المشاعر.",
        "كنت بحبها فعلًا، بس الحب وقتها كان عاجز قدام الواقع.",
        "مش كل اللي بيبعد بيكون خائن، في ناس بتبعد لأنها تايهة."
      ];
      reply = loveMistakeReplies[Math.floor(Math.random()*loveMistakeReplies.length)];
    }

    // 🔹 عن سارة
    else if (msg.includes("سارة") || msg.includes("هي")) {
      const saraReplies = [
        "سارة كانت أضعف مما كنت متخيل، وده خلاني ألوم نفسي بعدين.",
        "مكنتش فاهم وقتها قد إيه سكوتي هيأذيها.",
        "أكتر حاجة ندمت عليها إني مسبتش تفسير واضح."
      ];
      reply = saraReplies[Math.floor(Math.random()*saraReplies.length)];
    }

    // 🔹 عن الأخطاء وقلة الكلام
    else if (msg.includes("سكوت") || msg.includes("كلام") || msg.includes("توضيح")) {
      const silenceReplies = [
        "الغلط الأكبر إني سكت، السكوت هو اللي بوّظ كل حاجة.",
        "كنت فاكر إن البعد المؤقت أرحم من وعود مش ضامنها.",
        "ماكنتش مدرك إن قلة الكلام هتتفسر على إنها خيانة."
      ];
      reply = silenceReplies[Math.floor(Math.random()*silenceReplies.length)];
    }

    // 🔹 عن صورة البنت
    else if (msg.includes("صورة") || msg.includes("البنت") || msg.includes("اخت") || msg.includes("خالتها")) {
      const photoReplies = [
        "الصورة اتفهمت غلط، وأنا غلطت إني موضحتش.",
        "كانت مجرد صورة عائلية، لكن التأخير في التوضيح دمّر الثقة.",
        "الناس شافت الصورة، بس محدش شاف اللي وراها."
      ];
      reply = photoReplies[Math.floor(Math.random()*photoReplies.length)];
    }

    // 🔹 عن المقهى / اللقاء
    else if (msg.includes("مقهى") || msg.includes("لقاء") || msg.includes("شوفها") || msg.includes("الحظة")) {
      const cafeReplies = [
        "المقهى كان صدمة، ماكنتش متوقع أشوفها بعد كل السنين دي.",
        "في اللحظة دي حسيت إن الماضي كله رجع مرة واحدة.",
        "نظرتها كانت مليانة أسئلة أكتر من كلام."
      ];
      reply = cafeReplies[Math.floor(Math.random()*cafeReplies.length)];
    }

    // 🔹 عن الندم
    else if (msg.includes("ندم") || msg.includes("خطأ") || msg.includes("غلط")) {
      const regretReplies = [
        "أيوه ندمت، مش على السفر، لكن على الطريقة.",
        "في حاجات لو رجع بيا الزمن كنت عملتها غير كده.",
        "الندم بييجي دايمًا متأخر."
      ];
      reply = regretReplies[Math.floor(Math.random()*regretReplies.length)];
    }

    // 🔹 لو القارئ شكك في كلامه
    else if (msg.includes("شك") || msg.includes("مش فاهم") || msg.includes("حقيقي")) {
      const doubtReplies = [
        "من حقك تشك، القصة من بره شكلها وحش.",
        "أنا مش بدافع عن نفسي، بحكي اللي حصل.",
        "مش بطلب تعاطف، بس بطلب فهم."
      ];
      reply = doubtReplies[Math.floor(Math.random()*doubtReplies.length)];
    }

    // 🔹 ردود عامة لأي سؤال
    else if (msg.includes("إيه حصل") || msg.includes("ليه") || msg.includes("ليه كده")) {
      const generalReplies = [
        "القصة مش أبيض وأسود.",
        "كل واحد شاف جزء، محدش شاف الصورة كاملة.",
        "اللي حصل كان نتيجة تراكمات، مش قرار واحد."
      ];
      reply = generalReplies[Math.floor(Math.random()*generalReplies.length)];
    }

    // 🔹 أي كلمة واحدة أو غير واضحة
    else {
      const unknownReplies = [
        "مش فاهم قصدك… ممكن توضحي بطريقة تانية؟",
        "حاول تشرحي أكتر… عايز أفهم قصدك بالضبط",
        "مش واضح… قولّي بالضبط قصدك إيه."
      ];
      reply = unknownReplies[Math.floor(Math.random()*unknownReplies.length)];
    }

    addMessage("يوسف: " + reply,'from-character');
  },1000);
}

// إرسال بالضغط على Enter
document.getElementById('userInput').addEventListener('keydown', function(e){
  if(e.key==='Enter'){ sendMessage(); }
});
</script>

</body>
</html>
