<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق قصيتك</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Cairo',sans-serif;
  margin:0;
  background:url('https://images.unsplash.com/photo-1660244099620-72268ca85fc5?q=80&w=1400&auto=format&fit=crop') no-repeat center center fixed;
  background-size:cover;
  direction:rtl;
  color:#E0E0E0;
}
header{
  background:rgba(0,0,0,.6);
  padding:20px;
  font-size:28px;
  font-weight:bold;
}
.story-list{
  display:flex;
  flex-direction:column;
  gap:20px;
  padding:20px;
}
.story-card{
  display:flex;
  align-items:center;
  background:rgba(30,30,30,.8);
  border-radius:15px;
  padding:15px;
  cursor:pointer;
  transition:.3s;
}
.story-card:hover{transform:translateY(-4px)}
.story-card img{
  width:100px;
  height:100px;
  border-radius:15px;
  margin-left:20px;
  object-fit:cover;
}
.story-info h3{margin:0;color:#000}
.story-info p{margin:5px 0 0;color:#ccc}
</style>
</head>

<body>

<header>تطبيق قصيتك</header>

<div class="story-list" id="storyList"></div>

<script>
fetch("stories.json")
.then(r=>r.json())
.then(stories=>{
  const list=document.getElementById("storyList");
  stories.forEach(story=>{
    const card=document.createElement("div");
    card.className="story-card";
    card.innerHTML=`
      <img src="${story.cardBg}">
      <div class="story-info">
        <h3>${story.title}</h3>
        <p>اضغط لقراءة القصة</p>
      </div>`;
    card.onclick=()=>location.href="mm2.html?id="+story.id;
    list.appendChild(card);
  });
});
</script>

</body>
</html>
