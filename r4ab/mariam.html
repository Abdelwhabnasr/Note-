// ردود لو خرج برا القصة
const redirectReplies=[
"حاسة إنك بعيد عن حكايتي… تحب تسمع اللي حصل في الفندق؟",
"خلينا في قصتي أحسن… أسألك عن الورق المزور؟",
"يمكن سؤالك بعيد شوية… تحب أكمل عن خالة نوسة؟",
"أنا بحكي قصة مش سهلة… تحب تعرف سر شهادة الوفاة؟"
];

function getReply(msg){

msg=msg.toLowerCase();

// بحث
for(let item of replies){
for(let key of item.keywords){
if(msg.includes(key)){
memory.lastTopic=item.topic;
return item.answers[Math.floor(Math.random()*item.answers.length)];
}
}
}

// لو مفيش تطابق
if(memory.lastTopic){
return redirectReplies[Math.floor(Math.random()*redirectReplies.length)];
}

return "مش عارفة أقول إيه… يمكن لسه مش جاهزة أتكلم.";
}

function sendMessage(){
const input=document.getElementById('userInput');
const text=input.value.trim();
if(!text) return;

addMessage(text,'from-user');
input.value='';

// تأخير بشري حقيقي
const delay=Math.random()*1000+1000;

setTimeout(()=>{
addMessage("مريم تكتب...",'from-character');

setTimeout(()=>{
chat.lastChild.remove();
const reply=getReply(text);
addMessage(" "+reply,'from-character');
},500);

},delay);
}

document.getElementById('userInput')
.addEventListener('keydown',e=>{
if(e.key==='Enter') sendMessage();
});
