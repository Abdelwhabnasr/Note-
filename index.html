<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تطبيق قصصك</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      margin: 0;
      padding: 0;
      background: url('https://images.unsplash.com/photo-1660244099620-72268ca85fc5?q=80&w=1400&auto=format&fit=crop') no-repeat center center fixed;
      background-size: cover;
      color: #FFD700;
      direction: rtl;
    }

    header {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      text-align: right;
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    }

    .story-list {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px;
      justify-content: center;
    }

    .story-card {
      width: 250px;
      cursor: pointer;
      border-radius: 15px;
      overflow: hidden;
      background: rgba(30,30,30,0.8);
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    }

    .story-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.7);
    }

    .story-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .story-card .story-info {
      padding: 10px;
    }

    .story-card .story-info h3 {
      margin: 0;
      color: #FFD700;
    }

    .story-card .story-info p {
      margin: 5px 0 0;
      color: #CCCCCC;
      font-size: 14px;
    }

    /* تصميم الزرين أسفل الصفحة */
    .bottom-buttons {
      max-width: 600px;
      margin: 30px auto;
      display: flex;
      justify-content: space-around;
      gap: 20px;
    }

    .bottom-buttons button {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .bottom-buttons button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    }

    .home-btn {
      background: #FFD700;
      color: #000;
    }

    .add-story-btn {
      background: #FFA500;
      color: #000;
    }

  </style>
</head>
<body>

<header>تطبيق قصصك</header>

<div class="story-list">
  <div class="story-card" onclick="window.location.href='mm.html'">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSaVEp9KM_JvmiqYJ6f09kNN7dieYy5ivbsKA&s" alt="قصة رومانسية">
    <div class="story-info">
      <h3>قصة رومانسية</h3>
      <p>رومانسية وحب مثير</p>
    </div>
  </div>

  <div class="story-card" onclick="window.location.href='mm.html'">
    <img src="https://png.pngtree.com/thumb_back/fh260/background/20241217/pngtree-a-brave-warrior-in-armor-mounted-on-horse-prepared-for-adventure-image_16822499.jpg" alt="قصة مغامرات">
    <div class="story-info">
      <h3>قصة مغامرات</h3>
      <p>مغامرات وتشويق</p>
    </div>
  </div>

  <div class="story-card" onclick="window.location.href='r4ab/Sss.html'">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR3NhMlQEZVAUunytz4YYMash_sPmJb3Nnimw&s" alt="قصة رعب">
    <div class="story-info">
      <h3>قصة رعب</h3>
      <p>تشويق وإثارة</p>
    </div>
  </div>
</div>

<!-- الزرين أسفل الصفحة -->
<div class="bottom-buttons">
  <button class="home-btn" onclick="window.location.href='https://www.facebook.com/abdelwhab.nasser.918146'" >للتوصل </button>
</div>

</body>
</html>
