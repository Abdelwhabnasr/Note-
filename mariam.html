// رد افتراضي
const defaultReplies = [
"حاساك بعّدتي عن الموضوع… تقصد اللي حصل مع أهلي؟",
"مش فاهمة قصدك، تقصد موضوع الورق المزور؟",
"خلينا في حكايتي أحسن… تحب تعرف عن خالة نوسة؟",
"سؤالك بعيد شوية… تسألني عن اللي حصل في الفندق؟",
"أنا بحكي قصتي… تحب أكمل لك اللي حصل مع أبويا؟"
];

// دالة تجيب الرد
function getReply(message) {

  message = message
    .toLowerCase()
    .replace(/[^\u0600-\u06FF\s]/g, "");

  let words = message.split(" ");

  for (let item of replies) {
    for (let key of item.keywords) {

      if (words.includes(key) || message.includes(key)) {
        return item.answers[
          Math.floor(Math.random() * item.answers.length)
        ];
      }

    }
  }

  return defaultReplies[
    Math.floor(Math.random() * defaultReplies.length)
  ];
}

// إرسال رسالة
function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,'from-user');
  input.value='';

  setTimeout(()=>{
    const reply = getReply(text);
    addMessage("مريم: " + reply,'from-character');
  },800);
}

// إرسال بالضغط على Enter
document.getElementById('userInput').addEventListener('keydown', function(e){
  if(e.key==='Enter'){ sendMessage(); }
});
