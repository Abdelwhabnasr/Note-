<div id="chat" style="height:300px; overflow-y:auto; border:1px solid #ccc; padding:10px;"></div>

<input id="msg" placeholder="اكتب لمريم..." style="width:70%; padding:5px;" />
<button onclick="sendToMariam()" style="padding:5px 10px;">إرسال</button>

<script>
async function sendToMariam() {
  const msgInput = document.getElementById("msg");
  const chat = document.getElementById("chat");

  const userMsg = msgInput.value.trim();
  if (!userMsg) return;

  chat.innerHTML += `<div style="text-align:right; background:#444; color:#fff; padding:8px; border-radius:10px; margin:5px;">${userMsg}</div>`;
  msgInput.value = "";
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("https://note-five-chi.vercel.app/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: userMsg })
    });

    const data = await res.json();

    chat.innerHTML += `<div style="text-align:left; background:#f3c5d6; color:#000; padding:8px; border-radius:10px; margin:5px;">${data.reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  } catch (e) {
    chat.innerHTML += `<div style="text-align:left; background:#f3c5d6; color:#000; padding:8px; border-radius:10px; margin:5px;">مريم مش قادرة ترد دلوقتي 💔</div>`;
    chat.scrollTop = chat.scrollHeight;
  }
}
</script>
