function addMessage(text,type){
const msg=document.createElement('div');
msg.classList.add('message',type);
msg.textContent=text;
chat.appendChild(msg);
chat.scrollTop=chat.scrollHeight;
}

{topic:"t51", keywords:["تحليل","DNA","الوراثة","اختبار"], answers:[

  "سعاد وهالة اتصدموا لما النتيجة ظهرت.",

  "النتيجة قلبت كل السيناريو اللي كانوا عايشينه سنين."
]},{topic:"dnaFollowUp", keywords:["نتيجة","ايه حصل","زيادة","جزاء تاني"], 
 answers:[
  "لو حصل جديد هحكيلك على طول."
]},

{
  keywords: ["اه", "كملي", "بعدين", "حصل اي"],
  answers: [
    "بعد يومين الكل اتجمع في الصالون عشان الوصية.",
    "هالة بصت لأمها بذهول مرعب.",
    "الأستاذ رفعت قطع الدراما دي كلها وصوته رجع رسمي وقاسې.",
    "سعاد وقعت على الكرسي وهي مش مصدقة.",
    "قمت وقفت لمېت ورقي وبصيت لهم نظرة أخيرة قبل ما أمشي.",
    "طلعت من المكتب شمس القاهرة كانت دافية ولأول مرة من ١٨ سنة حسيت إني مش غريبة."

];

const redirectReplies = [
"حاسة إنك بعيد عن حكايتي… تحب تسمع اللي حصل في جلسة الوصية؟",
"خلينا في قصتي أحسن… أسألك عن الأوراق والوراثة؟",
"يمكن سؤالك بعيد شوية… تحب أكمل عن سعاد وهالة؟",
"أنا بحكي قصة مش سهلة… تحب تعرف نتيجة التحليل الوراثي؟"
];


function getReply(msg){

msg=msg.toLowerCase();

// بحث
for(let item of replies){
for(let key of item.keywords){
if(msg.includes(key)){
memory.lastTopic=item.topic;
return item.answers[Math.floor(Math.random()*item.answers.length)];
}
}
}

// لو مفيش تطابق
if(memory.lastTopic){
return redirectReplies[Math.floor(Math.random()*redirectReplies.length)];
}

return "مش عارفة أقول إيه… يمكن لسه مش جاهزة أتكلم.";
}

function sendMessage(){
const input=document.getElementById('userInput');
const text=input.value.trim();
if(!text) return;

addMessage(text,'from-user');
input.value='';

// تأخير بشري حقيقي
const delay=Math.random()*1000+1000;

setTimeout(()=>{
addMessage(" تكتب...",'from-character');

setTimeout(()=>{
chat.lastChild.remove();
const reply=getReply(text);
addMessage(" "+reply,'from-character');
},500);

},delay);
}

document.getElementById('userInput')
.addEventListener('keydown',e=>{
if(e.key==='Enter') sendMessage();
});
</script>
