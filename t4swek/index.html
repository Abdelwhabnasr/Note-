<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Pro Chat</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #eee; padding: 20px; }
        #chat { width: 100%; max-width: 400px; height: 500px; background: white; border-radius: 10px; overflow-y: auto; padding: 15px; border: 1px solid #ccc; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { margin: 10px 0; padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { background: #007bff; color: white; align-self: flex-end; }
        .ai { background: #e9e9eb; color: black; align-self: flex-start; }
        .input-group { display: flex; width: 100%; max-width: 400px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 0 5px 5px 0; outline: none; }
        button { padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px 0 0 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat"></div>
<div class="input-group">
    <input type="text" id="userInput" placeholder="اسأل أي شيء...">
    <button onclick="send()">إرسال</button>
</div>

<script>
    // تأكد من وضع مفتاحك هنا بشكل صحيح
    const MY_API_KEY = "AIzaSyDYc-RcOpcxlU5LKfTRk4QiwBKES-WnAhA";

    async function send() {
        const input = document.getElementById("userInput");
        const chat = document.getElementById("chat");
        const text = input.value.trim();
        if (!text) return;

        chat.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";

        try {
            // استخدام gemini-pro بدلاً من flash لحل مشكلة عدم العثور على الموديل
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${MY_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await response.json();
            
            if (data.error) {
                chat.innerHTML += `<div class="msg ai" style="color:red">خطأ: ${data.error.message}</div>`;
            } else if (data.candidates && data.candidates[0].content) {
                const aiText = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="msg ai">${aiText}</div>`;
            } else {
                chat.innerHTML += `<div class="msg ai" style="color:red">جوجل لم ترسل رداً، تأكد من إعدادات المفتاح.</div>`;
            }
        } catch (err) {
            chat.innerHTML += `<div class="msg ai" style="color:red">خطأ في الاتصال بالسيرفر.</div>`;
        }
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
