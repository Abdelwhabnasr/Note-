<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة Gemini</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; padding: 20px; }
        #chat-container { width: 100%; max-width: 450px; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 80vh; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; }
        .user { background: #007bff; color: white; align-self: flex-end; }
        .ai { background: #e9e9eb; color: black; align-self: flex-start; }
        .input-area { display: flex; padding: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        button { margin-right: 5px; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتب رسالتك...">
        <button onclick="sendMessage()">إرسال</button>
    </div>
</div>

<script type="module">
    // *** ضع مفتاحك في السطر التالي فقط ***
    const API_KEY = "AIzaSyDYc-RcOpcxlU5LKfTRk4QiwBKES-WnAhA"; 

    window.sendMessage = async () => {
        const input = document.getElementById("userInput");
        const messages = document.getElementById("messages");
        const text = input.value.trim();
        if (!text) return;

        messages.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            messages.innerHTML += `<div class="msg ai">${aiText}</div>`;
            messages.scrollTop = messages.scrollHeight;
        } catch (e) {
            messages.innerHTML += `<div class="msg ai" style="color:red">خطأ: تأكد من تشغيل VPN (لأنك في مصر) أو راجع المفتاح.</div>`;
        }
    }
</script>

</body>
</html>
