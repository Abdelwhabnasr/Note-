<script type="module">
    window.sendMessage = async () => {
        const input = document.getElementById("userInput");
        const messages = document.getElementById("messages");
        const text = input.value;
        if (!text) return;

        messages.innerHTML += `<div class="user-msg">${text}</div>`;
        input.value = "";

        // الرابط الوسيط لتخطي حظر جوجل في مصر
        const PROXY_URL = "https://corsproxy.io/?"; 
        const API_KEY = "AIzaSyDYc-RcOpcxlU5LKfTRk4QiwBKES-WnAhA"; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        try {
            const response = await fetch(PROXY_URL + encodeURIComponent(API_URL), {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await response.json();
            // التأكد من استلام الرد بشكل صحيح
            const aiText = data.candidates[0].content.parts[0].text;
            
            messages.innerHTML += `<div class="ai-msg">${aiText}</div>`;
            messages.scrollTop = messages.scrollHeight;
        } catch (error) {
            console.error(error);
            messages.innerHTML += `<div class="ai-msg" style="color:red">حدث خطأ. تأكد من تشغيل VPN (لأنك في مصر) أو راجع المفتاح.</div>`;
        }
    }
</script>

</body>
</html>
